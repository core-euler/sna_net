name: client
description: "A new Flutter project."
publish_to: 'none' 

version: 0.3.0+2

environment:
  sdk: ^3.9.2
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  fl_chart: ^1.1.1
  flutter_secure_storage: ^10.0.0
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^6.1.2
  http: ^1.2.2
  uuid: ^4.5.1
  provider: ^6.1.2
  flutter_markdown: ^0.7.0
  flutter_svg: ^2.1.0
  markdown: ^7.3.0
  path_provider: ^2.1.5
  record: ^6.1.1
  web_socket_channel: ^3.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - icon.png
    - icon_transparent.png
    - assets/grid.svg
    - assets/chat.svg
    - assets/search.svg
    - assets/map.svg
    - assets/person.svg
